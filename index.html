<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .app-card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            object-fit: cover;
            margin-left: 15px;
        }
        .app-info {
            flex-grow: 1;
        }
        .app-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
            color: #333;
        }
        .app-size {
            font-size: 0.9rem;
            color: #777;
            margin-top: 5px;
        }
        .download-btn {
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">قائمة التطبيقات المتوفرة</h2>
    <div id="app-list">
        </div>
</div>

<script src="data.js"></script>

<script>
    // وظيفة لعرض البيانات في الصفحة
    function displayApps() {
        const listContainer = document.getElementById('app-list');
        
        appsData.forEach(app => {
            const card = document.createElement('div');
            card.className = 'app-card';
            
            card.innerHTML = `
                <img src="${app.icon}" alt="${app.name}" class="app-icon">
                <div class="app-info">
                    <p class="app-name">${app.name}</p>
                    <p class="app-size">الحجم: ${app.size}</p>
                </div>
                <a href="${app.downloadUrl}" class="download-btn">تحميل IPA</a>
            `;
            
            listContainer.appendChild(card);
        });
    }

    // تشغيل الدالة عند تحميل الصفحة
    window.onload = displayApps;
</script>

</body>
</html>
