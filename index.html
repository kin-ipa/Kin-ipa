<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPA Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1b1b1b;
padding:30px;
border-radius:12px;
width:420px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#00c896;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>
</head>

<body>

<div class="box">

<h2>IPA Reader & Editor</h2>

<input type="file" id="ipaFile" accept=".ipa">

<br>

<button onclick="readIPA()">Read IPA</button>

<hr>

<input id="appName" placeholder="App Name">

<input id="bundleID" placeholder="Bundle ID">

<input id="version" placeholder="Version">

<br>

<button onclick="downloadPlist()">Download Edited Info.plist</button>

<pre id="status"></pre>

</div>

<script>

let plistContent="";

async function readIPA(){

let file=document.getElementById("ipaFile").files[0];

if(!file){
alert("Select IPA file");
return;
}

let zip=await JSZip.loadAsync(file);

let infoFile=null;

zip.forEach(function(path,file){

if(path.includes("Info.plist")){
infoFile=file;
}

});

if(!infoFile){
document.getElementById("status").innerText="Info.plist not found";
return;
}

plistContent=await infoFile.async("string");

document.getElementById("status").innerText="IPA Loaded Successfully";

let nameMatch=plistContent.match(/<key>CFBundleName</key>[\s\S]?<string>(.?)</string>/);
let bundleMatch=plistContent.match(/<key>CFBundleIdentifier</key>[\s\S]?<string>(.?)</string>/);
let versionMatch=plistContent.match(/<key>CFBundleShortVersionString</key>[\s\S]?<string>(.?)</string>/);

if(nameMatch) document.getElementById("appName").value=nameMatch[1];
if(bundleMatch) document.getElementById("bundleID").value=bundleMatch[1];
if(versionMatch) document.getElementById("version").value=versionMatch[1];

}

function downloadPlist(){

let name=document.getElementById("appName").value;
let bundle=document.getElementById("bundleID").value;
let version=document.getElementById("version").value;

let edited=plistContent
.replace(/(<key>CFBundleName</key>[\s\S]?<string>)(.?)(</string>)/,"$1"+name+"$3")
.replace(/(<key>CFBundleIdentifier</key>[\s\S]?<string>)(.?)(</string>)/,"$1"+bundle+"$3")
.replace(/(<key>CFBundleShortVersionString</key>[\s\S]?<string>)(.?)(</string>)/,"$1"+version+"$3");

let blob=new Blob([edited],{type:"text/xml"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Info.plist";

a.click();

}

</script>

</body>
</html>
